<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />

    <title>Agentic AI Platform</title>

    <link rel="stylesheet"
          href="/static/style.css?v=3" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet" />

</head>

<body>

<div class="app">

    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar">

        <div class="brand">

            <div class="logo">
                🧠
            </div>

            <div>

                <h2>
                    Agentic AI
                </h2>

                <span>
                    Enterprise Assistant
                </span>

            </div>

        </div>

        <button id="new-chat-btn"
                class="new-chat-btn">

            + New Conversation

        </button>

        <div class="sidebar-section">

            <h3>
                Recent Conversations
            </h3>

            <div id="history-container"
                 class="history-list">

                <div class="history-empty">
                    No saved conversations yet
                </div>

            </div>

        </div>

    </aside>


    <!-- ================= CHAT AREA ================= -->

    <main class="chat-wrapper">

        <header class="top-header">

            <div class="top-header__info">

                <div>

                    <h1>
                        Agentic AI Assistant
                    </h1>

                    <p>
                        LangGraph + RAG + Multi-Agent System
                    </p>

                </div>

                <div class="status-badge connected">

                    ● Connected

                </div>

            </div>

        </header>


        <!-- ================= HERO SECTION ================= -->

        <section id="chat-box"
                 class="chat-box">

            <div class="hero">

                <div class="hero-heading">

                    <h1>
                        Welcome, Sridhar 👋
                    </h1>

                    <p>
                        Ask anything about LangChain,
                        LangGraph, RAG, or simply have a conversation.
                    </p>

                </div>

                <div class="suggestions">

                    <button class="suggestion-card"
                            type="button">

                        👋 Say hello to the assistant

                    </button>

                    <button class="suggestion-card"
                            type="button">

                        🦜 What is LangChain?

                    </button>

                    <button class="suggestion-card"
                            type="button">

                        🕸️ Explain LangGraph architecture

                    </button>

                    <button class="suggestion-card"
                            type="button">

                        🔍 What is Retrieval-Augmented Generation (RAG)?

                    </button>

                </div>

            </div>

        </section>


        <!-- ================= INPUT AREA ================= -->

        <footer class="input-area">

            <div class="action-buttons">

                <button id="save-btn"
                        class="action-btn small"
                        type="button"
                        title="Download chat">

                    💾 Save Chat

                </button>

                <button id="clear-btn"
                        class="action-btn small"
                        type="button"
                        title="Clear chat">

                    🗑 Clear Chat

                </button>

            </div>

            <div class="input-panel">

                <textarea id="message-input"
                          placeholder="Ask Agentic AI..."
                          rows="1"></textarea>

                <div class="input-actions">

                    <button id="send-btn"
                            class="send-btn"
                            type="button">

                        ➤

                    </button>

                </div>

            </div>

        </footer>

    </main>

</div>

<script src="/static/script.js?v=3"></script>

</body>

</html>
